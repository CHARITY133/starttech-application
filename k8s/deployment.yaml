apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  labels:
    app: backend-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: backend-api
          image: PLACEHOLDER_ECR_IMAGE:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: mongo-uri
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: db-name
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: jwt-secret-key
            - name: JWT_EXPIRATION_HOURS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: jwt-expiration-hours
            - name: ENABLE_CACHE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: enable-cache
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: redis-addr
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: log-level
            - name: LOG_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: log-format
            - name: SECURE_COOKIE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: secure-cookie
            - name: COOKIE_DOMAINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: cookie-domains
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: allowed-origins
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
